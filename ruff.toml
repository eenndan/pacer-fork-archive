# Ruff config for pacer's Python: the studio app + binding generators.
# Generated bindings and the conda env are excluded. Run: ruff check / ruff format
line-length = 100
target-version = "py311"

extend-exclude = [
    ".pixi",
    "build",
    "3rdparty",
    "bindings/*/*/__init__.pyi",
    # frozen GPS-accuracy research evidence scripts (historical record, kept for repro)
    "studio/dev/research",
]

[lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",  # line length handled by the formatter
    "E402",  # scripts legitimately import after sys.path / env setup
]
